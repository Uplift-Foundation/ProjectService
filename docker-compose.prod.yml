
version: '3.4'

services:
  projectdb:
    image: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      forgetmenot:
    volumes:
      - project_db_storage:/var/lib/postgresql/data
  project_postgres_exporter:
    image: wrouesnel/postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@projectdb:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9192:9187"
    networks:
      forgetmenot:
    depends_on:
      - projectdb
  projectservice:
    ports:
      - "87:80"
    environment:
      VIRTUAL_HOST: forgetmenot.uplifttech.org, forgetmenot4.uplifttech.org
      VIRTUAL_PORT: 80
      VIRTUAL_PROTO: http
      LETSENCRYPT_HOST: forgetmenot.uplifttech.org, forgetmenot4.uplifttech.org
      LETSENCRYPT_EMAIL: wthompson@uplifttech.org
      ConnectionString__DefaultConnection: ${ConnectionString__DefaultConnection}
      Keycloak__OAuthClientId: ${Keycloak__OAuthClientId}
      Keycloak__Authority: ${Keycloak__Authority}
      Keycloak__Audience: ${Keycloak__Audience}
      Keycloak__AuthClientSecret: ${Keycloak__AuthClientSecret}
      ASPNETCORE_ENVIRONMENT: Release
      ASPNETCORE_HTTP_PORTS: 80
    networks:
      forgetmenot:
    depends_on:
      projectdb:
        condition: service_healthy

networks:
  forgetmenot:
    external: true

volumes:
  project_db_storage:
    external: true
