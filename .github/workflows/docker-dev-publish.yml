name: Push to Docker

on:
  schedule:
    - cron: '29 1 * * *'
  push:
    branches: [ "develop", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: wtvamp/projectservice
  SERVICE_DIR: ProjectService
  DOTNET_ROOT: /Users/warrenthompson/.dotnet

jobs:
  build:

    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      GH_PAT_AVAILABLE: ${{ secrets.GH_PAT != '' }}

    steps:
      - name: Clean workspace
        run: |
          rm -rf FMN.Vault _fmn-core publish Dockerfile.ci

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ProjectService

      - name: Checkout FMN.Vault shared library
        uses: actions/checkout@v4
        if: env.GH_PAT_AVAILABLE == 'true'
        with:
          repository: Uplift-Foundation/FMN-Core
          sparse-checkout: FMN.Vault
          sparse-checkout-cone-mode: true
          path: _fmn-core
          token: ${{ secrets.GH_PAT }}

      - name: Checkout FMN.Vault (fallback via GitHub API)
        if: env.GH_PAT_AVAILABLE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "GH_PAT not configured. Downloading FMN.Vault via GitHub API..."
          mkdir -p _fmn-core
          gh api repos/Uplift-Foundation/FMN-Core/tarball \
            -H "Accept: application/vnd.github+json" \
            > /tmp/fmn-core.tar.gz 2>/dev/null \
          && tar -xzf /tmp/fmn-core.tar.gz -C _fmn-core --strip-components=1 \
          || { echo "::error::Cannot access FMN-Core. Add GH_PAT secret with repo scope to this repository."; exit 1; }

      - name: Prepare build context
        run: cp -r _fmn-core/FMN.Vault ./FMN.Vault

      - name: Build .NET for linux-x64
        run: |
          cd ${{ env.SERVICE_DIR }}
          $DOTNET_ROOT/dotnet publish -c Release -r linux-x64 --self-contained false -o ../publish
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      - name: Import secrets from Vault
        if: github.event_name != 'pull_request'
        id: vault
        continue-on-error: true
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.uplifttech.org
          method: jwt
          role: fmn-cicd
          jwtGithubAudience: https://github.com/Uplift-Foundation
          secrets: |
            secret/data/fmn/cicd/dockerhub username | VAULT_DOCKER_USERNAME ;
            secret/data/fmn/cicd/dockerhub password | VAULT_DOCKER_PASSWORD

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ env.VAULT_DOCKER_PASSWORD || secrets.DOCKER_PASSWORD }}" | \
            docker login ${{ env.REGISTRY }} \
              -u "${{ env.VAULT_DOCKER_USERNAME || secrets.DOCKER_USERNAME }}" \
              --password-stdin

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        run: |
          cat > Dockerfile.ci << 'DEOF'
          FROM mcr.microsoft.com/dotnet/aspnet:10.0-noble-amd64
          WORKDIR /app
          EXPOSE 80
          COPY publish/ .
          ENTRYPOINT ["dotnet", "ProjectService.dll"]
          DEOF

          TAGS="${{ steps.meta.outputs.tags }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "$TAGS"

          docker buildx build \
            --platform linux/amd64 \
            --push \
            $TAG_ARGS \
            -f Dockerfile.ci \
            .

      - name: Build Docker image (PR only)
        if: github.event_name == 'pull_request'
        run: |
          cat > Dockerfile.ci << 'DEOF'
          FROM mcr.microsoft.com/dotnet/aspnet:10.0-noble-amd64
          WORKDIR /app
          EXPOSE 80
          COPY publish/ .
          ENTRYPOINT ["dotnet", "ProjectService.dll"]
          DEOF

          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.ci \
            .
